name: Smart News Digest

on:
  schedule:
    - cron: "0 23 * * *"   # 北京时间 7:00 早推送
    - cron: "0 7 * * *"    # 北京时间 15:00 下午推送
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      - name: Run news fetcher
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}  # 可选
        run: |
          echo "=== 开始执行新闻抓取 ==="
          echo "SCT_KEY 是否配置: ${{ secrets.SCT_KEY != '' }}"
          python main.py
          echo "=== 执行完成 ==="
        
      - name: Commit cache changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sent_news.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update news cache"
          git push || true
