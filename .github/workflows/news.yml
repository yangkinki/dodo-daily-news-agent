name: Smart News Digest

on:
  schedule:
    - cron: "0 23 * * *"  # 北京时间 7:00
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
     # - name: Install dependencies
    #    run: pip install feedparser requests google-generativeai
   # 👇 关键：安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      - name: Run news fetcher
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}
       # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # 可选
        run: python main.py
