name: 智能早报自动推送
on:
  schedule:
    - cron: "0 23 * * *"  # 北京时间 7:00
  workflow_dispatch:

jobs:
  run_agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python agent.py
