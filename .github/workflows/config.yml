# 新闻源配置
news_sources:
  # ===== 国内可访问的源（使用国内RSSHub镜像）=====
  - name: "知乎热榜"
    category: "热门话题"
    url: "https://rsshub.rssforever.com/zhihu/hot"
    enabled: true
    max_items: 3

  - name: "微博热搜"
    category: "热门话题"
    url: "https://rsshub.rssforever.com/weibo/search/hot"
    enabled: true
    max_items: 3

  - name: "掘金前端"
    category: "前端技术"
    url: "https://rsshub.rssforever.com/juejin/category/frontend"
    enabled: true
    max_items: 2

  - name: "InfoQ推荐"
    category: "技术资讯"
    url: "https://rsshub.rssforever.com/infoq/recommend"
    enabled: true
    max_items: 2

  - name: "少数派"
    category: "数字生活"
    url: "https://rsshub.rssforever.com/sspai/index"
    enabled: true
    max_items: 2

  # ===== 备用源（默认关闭）=====
  - name: "AI前沿"
    category: "人工智能"
    url: "https://rsshub.app/leiphone/tag/人工智能"
    enabled: false
    max_items: 2

  - name: "机器之心"
    category: "人工智能"
    url: "https://rsshub.app/jiqizhixin"
    enabled: false
    max_items: 2

  - name: "36氪"
    category: "创业投资"
    url: "https://rsshub.app/36kr"
    enabled: false
    max_items: 2

# 推送配置
push:
  # Server酱 (微信推送)
  server_chan:
    enabled: true
    # 从环境变量读取: SCT_KEY

  #  Bark (iOS推送)
  bark:
    enabled: false
    # 从环境变量读取: BARK_KEY

# 抓取配置
fetch:
  # 只抓取多少小时内的新闻
  hours_limit: 24
  # 请求超时(秒)
  timeout: 30
  # 重试次数
  retry: 3

# 缓存配置
cache:
  # 缓存文件路径
  file: "sent_news.json"
  # 缓存保留天数
  retention_days: 7
