# 新闻源配置
news_sources:
  # ===== 国内可访问的稳定源 =====
  - name: "知乎日报"
    category: "热门话题"
    url: "https://www.zhihu.com/rss"
    enabled: true
    max_items: 3

  - name: "Solidot"
    category: "科技资讯"
    url: "https://www.solidot.org/index.rss"
    enabled: true
    max_items: 3

  - name: "Phoronix"
    category: "开源技术"
    url: "https://www.phoronix.com/rss.php"
    enabled: true
    max_items: 2

  - name: "TechCrunch"
    category: "国际科技"
    url: "https://techcrunch.com/feed/"
    enabled: true
    max_items: 2

  # ===== 需要通过RSSHub的源（国内可能需代理）=====
  - name: "AI前沿"
    category: "人工智能"
    url: "https://rsshub.app/leiphone/tag/人工智能"
    enabled: false
    max_items: 2

  - name: "机器之心"
    category: "人工智能"
    url: "https://rsshub.app/jiqizhixin"
    enabled: false
    max_items: 2

  - name: "36氪"
    category: "创业投资"
    url: "https://rsshub.app/36kr"
    enabled: false
    max_items: 2

# 推送配置
push:
  # Server酱 (微信推送)
  server_chan:
    enabled: true
    # 从环境变量读取: SCT_KEY

  #  Bark (iOS推送)
  bark:
    enabled: false
    # 从环境变量读取: BARK_KEY

# 抓取配置
fetch:
  # 只抓取多少小时内的新闻
  hours_limit: 24
  # 请求超时(秒)
  timeout: 30
  # 重试次数
  retry: 3

# 缓存配置
cache:
  # 缓存文件路径
  file: "sent_news.json"
  # 缓存保留天数
  retention_days: 7
